# REUSE annotations for files that cannot carry a comment header. The plugin
# manifests must be pure JSON per the Claude Code plugin spec, so they take
# their license here rather than inline. Everything else has a per-file SPDX
# header. The toolkit is uniformly licensed `MIT OR Apache-2.0`.
#
# NOTE: directives generated by the style-author skill on an end user's machine
# (their AI_comm_and_writing_style.md and its deployed copies) are the user's
# own work and carry no license — the skill is instructed never to add one.
# Those files are not part of this repository and are out of REUSE scope.
#
# Verify: uvx --from "reuse[charset-normalizer]" reuse lint
version = 1

SPDX-PackageName = "claude-style-toolkit"
SPDX-PackageSupplier = "Gary Frattarola"

# The two JSON manifests must be pure JSON. The two SKILL.md files must open
# with YAML frontmatter on line 1 for the skill loader, so they cannot carry a
# leading comment header either. All four are annotated here.
[[annotations]]
path = [
    ".gitignore",
    ".claude-plugin/marketplace.json",
    "plugins/style-policy/.claude-plugin/plugin.json",
    "plugins/style-policy/skills/style-author/SKILL.md",
    "plugins/style-policy/skills/style-maintain/SKILL.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Gary Frattarola"
SPDX-License-Identifier = "MIT OR Apache-2.0"
