# REUSE annotations for the nine files that cannot (or should not) carry an
# inline header: the two JSON manifests (must be pure JSON per the plugin
# spec), the five SKILL.md files (must open with YAML frontmatter on line 1
# for the skill loader), .gitignore, and docs/.nojekyll (an empty marker file
# for GitHub Pages). Every other file has a per-file SPDX
# header. The toolkit is uniformly licensed `MIT OR Apache-2.0`.
#
# NOTE: directives generated by the style-author skill on an end user's machine
# (their AI_comm_and_writing_style.md and its deployed copies) are the user's
# own work and carry no license — the skill is instructed never to add one.
# Those files are not part of this repository and are out of REUSE scope.
#
# Verify: uvx --from "reuse[charset-normalizer]" reuse lint
version = 1

SPDX-PackageName = "claude-style-toolkit"
SPDX-PackageSupplier = "Gary Frattarola"

# Annotated paths (see header comment for why each cannot carry a header).
[[annotations]]
path = [
    ".gitignore",
    ".claude-plugin/marketplace.json",
    "plugins/edgar-style-policy/.claude-plugin/plugin.json",
    "plugins/edgar-style-policy/skills/style-author/SKILL.md",
    "plugins/edgar-style-policy/skills/style-switch/SKILL.md",
    "plugins/edgar-style-policy/skills/style-maintain/SKILL.md",
    "plugins/edgar-style-policy/skills/style-uninstall/SKILL.md",
    "plugins/edgar-style-policy/skills/self-update/SKILL.md",
    "docs/.nojekyll",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Gary Frattarola"
SPDX-License-Identifier = "MIT OR Apache-2.0"
